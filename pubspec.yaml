name: fit_tracker
description: Production-ready Flutter fitness tracking application.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^13.2.5

  # Networking
  internet_connection_checker_plus: ^2.9.1+2

  # State Management
  fpdart: ^1.2.0
  equatable: ^2.0.7
  flutter_riverpod: ^2.6.1

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  firebase_analytics: ^12.1.3
  firebase_crashlytics: ^5.0.8

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.0.0

  # Images & SVG
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

  # UI / Loading
  # skeletonizer removed - requires Flutter 3.31.0+

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Animations
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^1.2.0

  # Environment
  flutter_dotenv: ^6.0.0

  # Logging
  logger: ^2.6.2

  # Utilities
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  uuid: ^4.3.3
  intl: ">=0.19.0 <0.21.0"
  image_picker: ^1.1.2

  # Device & System
  device_info_plus: ^11.2.0
  app_version_update: ^6.2.0

  # Localization
  easy_localization: ^3.0.8

  # Charts (Fitness)
  fl_chart: ^0.68.0

  # Step Counter & Location
  pedometer_2: ^5.0.4
  geolocator: ^11.1.0
  sensors_plus: ^6.1.1

  # Nutrition API
  http: ^1.4.0
  mobile_scanner: ^6.0.5

  # Auth
  google_sign_in: ^6.2.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Maps (OpenStreetMap - no API key required)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Local Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Icons generator
  flutter_launcher_icons: ^0.14.4

  # Splash screen
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/translations/
    - .env

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
  min_sdk_android: 21

# Native Splash Screen Configuration
flutter_native_splash:
  color: "#0D1117"
  color_dark: "#0D1117"
  image: assets/images/splash_logo.png
  fullscreen: true
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  android_cooldown: 0