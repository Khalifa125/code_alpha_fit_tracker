workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.27.0
      xcode: latest
      cocoapods: default
      groups:
        - firebase_credentials
    scripts:
      - name: Configure Firebase (iOS)
        script: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" > ios/Runner/GoogleService-Info.plist
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Set iOS deployment target
        script: |
          cd ios
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/' Podfile
          cd ..
      - name: Install iOS pods
        script: |
          cd ios
          pod install
          cd ..
      - name: Build IPA
        script: |
          flutter build ipa --release --no-codesign
          mkdir -p build/ios/ipa/
          cd build/ios/archive/
          mkdir -p Runner.xcarchive/Payload
          cp -r Runner.xcarchive/Products/Applications/Runner.app Runner.xcarchive/Payload/
          cd Runner.xcarchive
          zip -r ../Runner.ipa Payload/
    artifacts:
      - build/ios/ipa/Runner.ipa
