workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.29.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Clean and get dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Install iOS pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install
          cd ..
      - name: Build IPA
        script: |
          flutter build ipa
    artifacts:
      - build/ios/ipa/*.ipa