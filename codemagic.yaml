workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.27.0
      xcode: latest
      cocoapods: default
    environment_variables:
      - FIREBASE_TOKEN
      - GOOGLE_SERVICE_INFO_PLIST
    scripts:
      - name: Install Firebase CLI
        script: |
          curl -sL https://firebase.tools/bin/install.sh | bash
      - name: Configure Firebase (iOS)
        script: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" > ios/Runner/GoogleService-Info.plist
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Set iOS deployment target
        script: |
          cd ios
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/' Podfile
          cd ..
      - name: Install iOS pods
        script: |
          cd ios
          pod install
          cd ..
      - name: Build IPA
        script: |
          flutter build ipa --release --no-codesign
          mkdir -p build/ios/ipa/
          cd build/ios/archive/
          mkdir -p Runner.xcarchive/Payload
          cp -r Runner.xcarchive/Products/Applications/Runner.app Runner.xcarchive/Payload/
          cd Runner.xcarchive
          zip -r ../ipa/Runner.ipa Payload/
          cd ../../..
    artifacts:
      - build/ios/ipa/Runner.ipa

  android-workflow:
    name: Android Build
    max_build_duration: 45
    environment:
      flutter: 3.27.0
      java: 17
    environment_variables:
      - GOOGLE_SERVICES_JSON
    scripts:
      - name: Setup Firebase (Android)
        script: |
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Build Android APK (debug)
        script: |
          flutter build apk --debug
      - name: Build Android APK (release)
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  flutter-analysis:
    name: Flutter Analyze
    max_build_duration: 15
    environment:
      flutter: 3.27.0
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Run Flutter analyze
        script: |
          flutter analyze --no-fatal-infos --no-fatal-warnings
      - name: Run tests
        script: |
          flutter test
