workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.29.0
      xcode: latest
      cocoapods: default
      java: "17"
    scripts:
      - name: Configure Firebase (iOS)
        script: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" > ios/Runner/GoogleService-Info.plist
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Set iOS deployment target and install pods
        script: |
          cd ios
          if [ ! -f Podfile ]; then
            touch Podfile
          fi
          if ! grep -q "platform :ios" Podfile; then
            echo "platform :ios, '15.0'" >> Podfile
          fi
          sed -i '' "s/platform :ios, '.*'/platform :ios, '15.0'/" Podfile
          pod install --repo-update || pod install
          cd ..
      - name: Build IPA
        script: |
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa