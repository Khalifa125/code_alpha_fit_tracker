workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60

    environment:
      flutter: 3.29.0
      xcode: latest

    integrations:
      app_store_connect: Codemagic

    scripts:
      - name: Clean & get packages
        script: |
          flutter clean
          flutter pub get

      - name: Build IPA (with signing)
        script: |
          flutter build ipa

    artifacts:
      - build/ios/ipa/*.ipa