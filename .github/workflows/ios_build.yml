name: iOS Build (unsigned IPA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.0

      - name: Setup Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.1.app 2>/dev/null || true
          xcodebuild -version

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Clean build artifacts
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Update CocoaPods
        run: |
          gem install cocoapods -v 1.15.2 --no-document
          pod --version

      - name: Install iOS pods
        working-directory: ios
        run: |
          pod install --repo-update

      - name: Create export options plist
        run: |
          cat > ios/exportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingDisabled</key>
              <true/>
          </dict>
          </plist>
          PLIST

      - name: Build archive (unsigned)
        working-directory: ios
        run: |
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Export unsigned IPA from archive
        working-directory: ios
        run: |
          xcodebuild -exportArchive \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            -exportPath ../build/ios/ipa \
            -exportOptionsPlist exportOptions.plist \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Verify IPA
        run: |
          echo "=== Archive ==="
          ls -la build/ios/archive/ 2>/dev/null || echo "No archive"
          echo "=== IPA ==="
          ls -la build/ios/ipa/ 2>/dev/null || echo "No IPA"
          file build/ios/ipa/*.ipa 2>/dev/null || echo "No IPA file"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fit-tracker-ipa
          path: |
            build/ios/ipa/*.ipa
            build/ios/archive/*.xcarchive
          if-no-files-found: error
