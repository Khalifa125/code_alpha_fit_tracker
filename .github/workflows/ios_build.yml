name: iOS Build (unsigned IPA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.0

      - name: Setup Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.1.app 2>/dev/null || true
          xcodebuild -version

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Clean build artifacts
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Update CocoaPods
        run: |
          gem install cocoapods -v 1.15.2 --no-document
          pod --version

      - name: Install iOS pods
        working-directory: ios
        run: |
          pod install --repo-update

      - name: Build release .app bundle
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../fit-tracker-unsigned.ipa Payload/
          rm -rf Payload
          ls -la ../fit-tracker-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fit-tracker-ipa
          path: build/ios/fit-tracker-unsigned.ipa
          if-no-files-found: error
